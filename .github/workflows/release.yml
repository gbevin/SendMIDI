name: Release

# Runs when a version tag (e.g. 1.3.2) is pushed. It builds and packages the
# Windows binary the way the release is distributed -- a zip holding a versioned
# folder with the executable, the readme and the license, plus a SHA-256 checksum
# -- and, together with the signed macOS package, drafts a GitHub release.
#
# macOS is built, signed (Developer ID), notarized and stapled by running
# Scripts/build-macos.sh; that requires the signing and notarization secrets
# documented on the macos job below.
#
# Linux is intentionally not packaged: a single prebuilt binary is too fragile
# across distributions, so Linux users build from source (which the CI workflow
# verifies on every push).

on:
  push:
    tags: [ '[0-9]+.[0-9]+.[0-9]+' ]

permissions:
  contents: write

jobs:
  windows:
    name: Windows package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: microsoft/setup-msbuild@v3
      - name: Build
        run: msbuild Builds/VisualStudio2017/sendmidi.sln /m /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143
      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $pkg = "sendmidi-windows-$version"
          New-Item -ItemType Directory -Path $pkg | Out-Null
          Copy-Item -Path "Builds/VisualStudio2017/x64/Release/ConsoleApp/sendmidi.exe", "README.md", "COPYING.md" -Destination $pkg
          Compress-Archive -Path $pkg -DestinationPath "$pkg.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "$pkg.zip").Hash.ToLower()
          Set-Content -Path "$pkg.zip.sha256" -Value "$hash  $pkg.zip" -Encoding ascii
      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: sendmidi-windows-*.zip*

  # Requires five repository secrets (Settings -> Secrets and variables -> Actions):
  #   MACOS_CERTIFICATE      base64 of a .p12 holding BOTH the "Developer ID
  #                          Application" and "Developer ID Installer" identities
  #   MACOS_CERTIFICATE_PWD  the password used when exporting that .p12
  #   NOTARY_KEY             base64 of the App Store Connect API key (.p8)
  #   NOTARY_KEY_ID          that key's Key ID
  #   NOTARY_ISSUER_ID       the App Store Connect API Issuer ID
  macos:
    name: macOS package
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Import Developer ID certificates
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 24)"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certs.p12"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security import "$RUNNER_TEMP/certs.p12" -k "$KEYCHAIN" -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign -T /usr/bin/pkgbuild -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm "$RUNNER_TEMP/certs.p12"

      - name: Store notarization credentials
        env:
          NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          echo "$NOTARY_KEY" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          xcrun notarytool store-credentials "notary-uwyn.com" \
            --key "$RUNNER_TEMP/notary.p8" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID"
          rm "$RUNNER_TEMP/notary.p8"

      - name: Build, sign, notarize and package
        run: bash -e ./Scripts/build-macos.sh "$GITHUB_REF_NAME"

      - name: Checksum
        run: |
          cd Installers
          zip=$(ls sendmidi-macOS-*.zip)
          shasum -a 256 "$zip" > "$zip.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: Installers/sendmidi-macOS-*.zip*

  release:
    name: Draft release
    needs: [ windows, macos ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Draft GitHub release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: dist/*
